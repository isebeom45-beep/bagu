<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏐 THE SPIKE: REALISTIC EDITION 🏐</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="score-board">
        <span id="p1-score">00</span>

    </div>

    <script src="game.js"></script>

</html>
