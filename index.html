<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏐 THE SPIKE: REALISTIC EDITION 🏐</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { background-color: #0d0f14; color: #ffffff; font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        #score-board { font-size: 4.5rem; font-weight: 900; margin-bottom: 10px; display: flex; gap: 380px; text-shadow: 0 10px 30px rgba(0,0,0,0.7); letter-spacing: 12px; font-style: italic; }
        #p1-score { color: #ff6d00; }
        #p2-score { color: #00e5ff; }
        canvas { background: #14171f; border: 5px solid #2e3846; border-radius: 12px; box-shadow: 0 40px 100px rgba(0,0,0,0.8); max-width: 98vw; max-height: 85vh; }
        #control-info { margin-top: 15px; display: flex; justify-content: space-between; width: 1700px; max-width: 95%; color: #8fa0b5; font-size: 1.2rem; padding: 0 40px; font-weight: bold; }
        .key { background: #222a36; padding: 4px 16px; border-radius: 6px; color: #fff; font-weight: 900; border-bottom: 4px solid #131922; margin: 0 4px; }
        .highlight { color: #ff9100; }
    </style>
</head>
<body>

    <div id="score-board">
        <span id="p1-score">00</span>
        <span id="p2-score">00</span>
    </div>

    <canvas id="gameCanvas" width="1700" height="850"></canvas>

    <div id="control-info">
        <span>🧡 1P: <span class="key">A</span><span class="key">D</span> 이동 / <span class="key">W</span> 점프 / 공중에서 <span class="key">T</span> <span class="highlight">스파이크</span></span>
        <span>🔥 매치: 난이도 하향 완료! 낙하지점 가이드 서클 및 넓은 타점 적용</span>
        <span>💙 2P: <span class="key">◀</span><span class="key">▶</span> 이동 / <span class="key">▲</span> 점프 / 공중에서 <span class="key">Enter</span> <span class="highlight">스파이크</span></span>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const p1ScoreTxt = document.getElementById('p1-score');
        const p2ScoreTxt = document.getElementById('p2-score');

        // 난이도 하향 패치 적용 물리 세팅
        const BASE_GRAVITY = 0.44; 
        const FLOOR_Y = canvas.height - 100; 
        const NET_W = 14;
        const NET_H = 270; 

        // 대폭 넓어진 좌우 서브라인
        const SERVE_LINE_1P = 300;  
        const SERVE_LINE_2P = 1400; 

        let score = { p1: 0, p2: 0 };
        let gameMsg = "REMASTERED MATCH START";
        let msgTimer = 130;
        let shakeFrames = 0; 
        let currentServer = 1; 
        let isServingPhase = true; 
        let isGameOver = false;

        let p1Touches = 0;
        let p2Touches = 0;
        let lastTouchPlayer = null; 
        let isAutoReceiveShot = false; 
        let animFrame = 0; 

        // --- 🧑‍🎨 [리얼 웹툰 스타일] 정밀 인체 비주얼 드로잉 시스템 ---
        function drawRealisticAnimePlayer(ctx, x, y, isJumping, vy, color, side, spikingTimer) {
            ctx.save();
            let dir = (side === 'left') ? 1 : -1;
            let walk = Math.sin(animFrame * 0.18) * 8;
            let isSpiking = spikingTimer > 0;

            // 바닥 리얼 소프트 그림자
            let shadowSize = isJumping ? 26 - (FLOOR_Y - y) * 0.025 : 42;
            if(shadowSize < 8) shadowSize = 8;
            ctx.fillStyle = "rgba(0, 0, 0, 0.45)";
            ctx.beginPath(); ctx.ellipse(x, FLOOR_Y + 4, shadowSize, shadowSize * 0.22, 0, 0, Math.PI * 2); ctx.fill();

            // 1. 다리 관절 및 러닝 슈즈 구조 (깨짐 현상 전면 차단 고정형 링크 구조)
            ctx.lineWidth = 7.5; ctx.lineCap = "round"; ctx.strokeStyle = "#11151c"; // 언더 타이즈 레깅스 기본 베이스
            let hipY = y + 42;
            
            ctx.beginPath();
            if (isJumping) {
                // 도약 시 무릎 굽힘 형태 안정감 하중 구현
                ctx.moveTo(x - 8, hipY); ctx.lineTo(x - 16, hipY + 18); ctx.lineTo(x - 10, hipY + 36);
                ctx.moveTo(x + 8, hipY); ctx.lineTo(x + 4, hipY + 20); ctx.lineTo(x + 14, hipY + 36);
            } else {
                // 자연스러운 달리기 보행 각도
                ctx.moveTo(x - 8, hipY); ctx.lineTo(x - 10 + walk, hipY + 20); ctx.lineTo(x - 8 + walk, hipY + 40);
                ctx.moveTo(x + 8, hipY); ctx.lineTo(x + 10 - walk, hipY + 20); ctx.lineTo(x + 8 - walk, hipY + 40);
            }
            ctx.stroke();

            // 슈즈 디테일 포인트 마킹
            ctx.fillStyle = "#ffffff";
            if(isJumping) {
                ctx.fillRect(x - 14, hipY + 32, 8, 7); ctx.fillRect(x + 10, hipY + 32, 8, 7);
            } else {
                ctx.fillRect(x - 12 + walk, hipY + 36, 8, 7); ctx.fillRect(x + 6 - walk, hipY + 36, 8, 7);
            }

            // 2. 스포츠 슬림핏 쇼츠 반바지 구역
            ctx.fillStyle = "#161b22";
            ctx.beginPath(); ctx.roundRect(x - 17, y + 22, 34, 22, 4); ctx.fill();

            // 3. 만화 비율 상체 체형 유니폼 그라데이션 몸통
            let bodyGrad = ctx.createLinearGradient(x - 16, y, x + 16, y);
            bodyGrad.addColorStop(0, color); bodyGrad.addColorStop(0.4, color); bodyGrad.addColorStop(1, "#ffffff");
            ctx.fillStyle = bodyGrad;
            ctx.beginPath(); ctx.roundRect(x - 17, y - 32, 34, 56, 8); ctx.fill();

            // 백넘버 및 프론트 라벨 넘버링 정밀 고딕 폰트 적용
            ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.font = "bold 900 18px 'Segoe UI'"; ctx.textAlign = "center";
            ctx.fillText(side === 'left' ? "10" : "1", x - (1 * dir), y + 3);

            // 4. 슬림 목 고정
            ctx.strokeStyle = "#fcd4b4"; ctx.lineWidth = 6;
            ctx.beginPath(); ctx.moveTo(x, y - 30); ctx.lineTo(x, y - 42); ctx.stroke();

            // 5. 웹툰 스타일 날렵한 페이스 및 비대칭 크루 헤어스타일
            ctx.fillStyle = "#fcd4b4"; 
            ctx.beginPath(); ctx.arc(x, y - 54, 14, 0, Math.PI * 2); ctx.fill();
            
            // 헤어 외곽 레이어링
            ctx.fillStyle = side === 'left' ? "#e65100" : "#263238"; 
            ctx.beginPath(); ctx.arc(x, y - 59, 15, Math.PI, 0); ctx.fill();
            // 앞머리 디테일 구현 표현
            ctx.fillRect(x - 15, y - 59, 30, 8);
            ctx.beginPath();
            ctx.moveTo(x - 15, y - 51); ctx.lineTo(x - 5 * dir, y - 45); ctx.lineTo(x + 15, y - 51); ctx.fill();

            // 날카로운 인게임 눈매 매핑
            ctx.fillStyle = "#fff"; ctx.fillRect(x + (6 * dir), y - 55, 5, 4);
            ctx.fillStyle = "#000"; ctx.fillRect(x + (8 * dir), y - 54, 3, 3);

            // 6. 스파이크 체트 모션 다이내믹 암(Arm) 컨트롤 (좌표 어긋남 철저 방지)
            ctx.strokeStyle = "#fcd4b4"; ctx.lineWidth = 6.5; ctx.lineCap = "round";
            ctx.beginPath();
            if (isSpiking) {
                // 내려꽂는 강렬한 스파이크 스윙 궤적
                ctx.moveTo(x - (8 * dir), y - 16); 
                ctx.lineTo(x + (26 * dir), y - 75); 
                ctx.lineTo(x + (46 * dir), y - 18);
            } else if (isJumping && vy < 0) {
                // 점프 도약 상승 시 양팔을 위로 뻗는 모션
                ctx.moveTo(x - (12 * dir), y - 12); ctx.lineTo(x - (22 * dir), y - 58);
                ctx.moveTo(x + (12 * dir), y - 12); ctx.lineTo(x + (26 * dir), y - 60);
            } else {
                // 수비형 리시브 언더핸드 스탠스 안정 기본 팔
                ctx.moveTo(x - (14 * dir), y - 10);
                ctx.lineTo(x + (16 * dir), y + 14);
            }
            ctx.stroke();
            ctx.restore();
        }

        class Spiker {
            constructor(x, color, side) {
                this.x = x; this.y = FLOOR_Y - 42; this.radius = 28; 
                this.vx = 0; this.vy = 0; this.isJumping = false;
                this.color = color; this.side = side; this.speed = 9.2;
                this.spikingVisualTimer = 0; 
            }
            update(ignoreLimits = false) {
                this.x += this.vx; this.y += this.vy;
                this.vy += BASE_GRAVITY;

                if (this.y > FLOOR_Y - 42) { this.y = FLOOR_Y - 42; this.vy = 0; this.isJumping = false; }
                
                if (!ignoreLimits) {
                    let leftLimit = 60; let rightLimit = canvas.width/2 - 60;
                    if (this.side === 'right') { leftLimit = canvas.width/2 + 60; rightLimit = canvas.width - 60; }
                    if (this.x < leftLimit) this.x = leftLimit;
                    if (this.x > rightLimit) this.x = rightLimit;
                } else {
                    if (this.x < 55) this.x = 55;
                    if (this.x > canvas.width - 55) this.x = canvas.width - 55;
                }
                if (this.spikingVisualTimer > 0) this.spikingVisualTimer--;
                this.vx = 0;
            }
            draw() {
                drawRealisticAnimePlayer(ctx, this.x, this.y, this.isJumping, this.vy, this.color, this.side, this.spikingVisualTimer);
            }
        }

        const players = {
            p1: new Spiker(180, '#ff6d00', 'left'),
            p2: new Spiker(1520, '#00b8d4', 'right')
        };

        const setters = [
            { x: 620, y: FLOOR_Y - 42, color: '#ffcc80', base: 620, side: 'left', isJumping: false, vy: 0, spikingVisualTimer: 0 },
            { x: 1080, y: FLOOR_Y - 42, color: '#80deea', base: 1080, side: 'right', isJumping: false, vy: 0, spikingVisualTimer: 0 }
        ];

        const ball = { x: 200, y: 320, vx: 0, vy: 0, radius: 19, isSmashed: false, rotation: 0 };
        const keys = {};

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function triggerHit(type) {
            gameMsg = type; msgTimer = 45;
            if (type.includes("SPIKE") || type.includes("FAULT") || type.includes("ATTACK")) { shakeFrames = 15; ball.isSmashed = true; }
            else { ball.isSmashed = false; }
        }

        function triggerScore(winner) {
            if (winner === 'p1') { score.p1++; p1ScoreTxt.textContent = score.p1 < 10 ? '0' + score.p1 : score.p1; currentServer = 1; } 
            else { score.p2++; p2ScoreTxt.textContent = score.p2 < 10 ? '0' + score.p2 : score.p2; currentServer = 2; }
            p1Touches = 0; p2Touches = 0; lastTouchPlayer = null;

            if (score.p1 >= 15 || score.p2 >= 15) {
                isGameOver = true; gameMsg = winner === 'p1' ? "PLAYER 1 WIN!" : "PLAYER 2 WIN!"; msgTimer = 9999;
            } else {
                initServe(); 
            }
        }

        function initServe() {
            if (isGameOver) return;
            isServingPhase = true; ball.isSmashed = false; ball.vy = 0; ball.vx = 0; isAutoReceiveShot = false;

            if (currentServer === 1) {
                players.p1.x = 120; ball.x = 120; ball.y = FLOOR_Y - 42;
                triggerHit("1P SERVE TIME");
            } else {
                players.p2.x = 1580; ball.x = 1580; ball.y = FLOOR_Y - 42;
                triggerHit("2P SERVE TIME");
            }
        }

        function update() {
            if (isGameOver) return;
            animFrame++;

            if (isServingPhase) {
                if (keys['a']) players.p1.vx = -players.p1.speed; if (keys['d']) players.p1.vx = players.p1.speed;
                if (keys['w'] && !players.p1.isJumping) { players.p1.vy = -16.5; players.p1.isJumping = true; }

                if (keys['arrowleft']) players.p2.vx = -players.p2.speed; if (keys['arrowright']) players.p2.vx = players.p2.speed;
                if (keys['arrowup'] && !players.p2.isJumping) { players.p2.vy = -16.5; players.p2.isJumping = true; }

                if (currentServer === 1) {
                    if (!players.p1.isJumping && players.p1.x >= SERVE_LINE_1P) {
                        triggerScore('p2'); triggerHit("⚠️ 1P LINE FAULT!"); return;
                    }
                } else {
                    if (!players.p2.isJumping && players.p2.x <= SERVE_LINE_2P) {
                        triggerScore('p1'); triggerHit("⚠️ 2P LINE FAULT!"); return;
                    }
                }

                if (currentServer === 1) {
                    if (players.p1.isJumping) {
                        if (players.p1.vy >= -3 && players.p1.vy <= 3) { 
                            ball.x = players.p1.x + 25; ball.y = players.p1.y - 35; ball.vy = 2.0; 
                            let speed = 26; let angle = 85 * Math.PI / 180;
                            ball.vx = speed * Math.cos(angle * 0.12); ball.vy = speed * Math.sin(angle * 0.08);

                            if (Math.random() < 0.5) { isAutoReceiveShot = true; ball.vx = (players.p2.x - ball.x) / 34; }
                            isServingPhase = false; players.p1.spikingVisualTimer = 18; lastTouchPlayer = 'p1'; p1Touches = 1;
                            triggerHit("💥 JUMP SERVE");
                        } else { ball.x = players.p1.x; ball.y = players.p1.y - 100; }
                    } else { ball.x = players.p1.x; ball.y = FLOOR_Y - 42; }
                } 
                else { 
                    if (players.p2.isJumping) {
                        if (players.p2.vy >= -3 && players.p2.vy <= 3) {
                            ball.x = players.p2.x - 25; ball.y = players.p2.y - 35; ball.vy = 2.0;
                            let speed = 26;
                            ball.vx = -speed * Math.cos(85 * Math.PI / 180 * 0.12); ball.vy = speed * Math.sin(85 * Math.PI / 180 * 0.08);

                            if (Math.random() < 0.5) { isAutoReceiveShot = true; ball.vx = (players.p1.x - ball.x) / 34; }
                            isServingPhase = false; players.p2.spikingVisualTimer = 18; lastTouchPlayer = 'p2'; p2Touches = 1;
                            triggerHit("💥 JUMP SERVE");
                        } else { ball.x = players.p2.x; ball.y = players.p2.y - 100; }
                    } else { ball.x = players.p2.x; ball.y = FLOOR_Y - 42; }
                }
                players.p1.update(true); players.p2.update(true);
                return;
            }

            if (keys['a']) players.p1.vx = -players.p1.speed; if (keys['d']) players.p1.vx = players.p1.speed;
            if (keys['w'] && !players.p1.isJumping) { players.p1.vy = -16.5; players.p1.isJumping = true; }

            if (keys['arrowleft']) players.p2.vx = -players.p2.speed; if (keys['arrowright']) players.p2.vx = players.p2.speed;
            if (keys['arrowup'] && !players.p2.isJumping) { players.p2.vy = -16.5; players.p2.isJumping = true; }

            players.p1.update(false); players.p2.update(false);

            ball.y += ball.vy; ball.vy += BASE_GRAVITY * 0.65; ball.x += ball.vx;
            ball.rotation += ball.vx * 0.03;

            if (lastTouchPlayer === 'p1' || lastTouchPlayer === 's1') setters[1].touchCount = 0;
            if (lastTouchPlayer === 'p2' || lastTouchPlayer === 's2') setters[0].touchCount = 0;

            // 세터 고도화 AI 로직
            setters.forEach((s) => {
                s.y += s.vy; s.vy += BASE_GRAVITY;
                if (s.y > FLOOR_Y - 42) { s.y = FLOOR_Y - 42; s.vy = 0; s.isJumping = false; }
                if (s.spikingVisualTimer > 0) s.spikingVisualTimer--;

                if ((s.side === 'left' && ball.x < canvas.width/2 && ball.vx < 0) || (s.side === 'right' && ball.x > canvas.width/2 && ball.vx > 0)) {
                    s.x += (ball.x - s.x) * 0.28; 
                } else { s.x += (s.base - s.x) * 0.05; }

                let dx = ball.x - s.x; let dy = ball.y - s.y;
                let teamTouches = s.side === 'left' ? p1Touches : p2Touches;
                let partner = s.side === 'left' ? players.p1 : players.p2;

                if (Math.sqrt(dx*dx + dy*dy) < ball.radius + 55) {
                    if (teamTouches < 3) {
                        let isPlayerAvailable = (s.side === 'left') ? (partner.x < canvas.width/2 - 60) : (partner.x > canvas.width/2 + 60);
                        let mustSendOver = (teamTouches === 2) || !isPlayerAvailable;

                        if (mustSendOver) {
                            ball.vy = 4.5; ball.vx = (s.side === 'left' ? 18 : -18);
                            s.vy = -6; s.isJumping = true; s.spikingVisualTimer = 15;
                            if (s.side === 'left') p1Touches++; else p2Touches++;
                            lastTouchPlayer = s.side === 'left' ? 's1' : 's2';
                            triggerHit("🔥 3-TOUCH DIRECT ATTACK!");
                        } 
                        else {
                            ball.vy = -23.5; 
                            ball.vx = (partner.x - s.x) * 0.042; 
                            s.vy = -6.5; s.isJumping = true; s.spikingVisualTimer = 12;
                            if (s.side === 'left') p1Touches++; else p2Touches++;
                            lastTouchPlayer = s.side === 'left' ? 's1' : 's2';
                            triggerHit("🏐 PERFECT HIGH TOSS");
                        }
                    }
                }
            });

            // 랠리 보정 수비 자동 리시브
            if (isAutoReceiveShot && lastTouchPlayer !== 's1' && lastTouchPlayer !== 's2') {
                let receiver = (currentServer === 1) ? players.p2 : players.p1;
                let rx = ball.x - receiver.x; let ry = ball.y - receiver.y;
                if (Math.sqrt(rx*rx + ry*ry) < 110) { 
                    ball.vy = -19; ball.vx = (receiver.side === 'left') ? 4.5 : -4.5;
                    if (receiver.side === 'left') { p1Touches = 1; p2Touches = 0; } else { p2Touches = 1; p1Touches = 0; }
                    lastTouchPlayer = (receiver.side === 'left') ? 'p1' : 'p2';
                    isAutoReceiveShot = false; triggerHit("🛡️ PERFECT RECEIVE");
                }
            }

            // 난이도 최적화: 유저 자율 타점 범위를 110으로 상향 버프 (여유롭게 후려칠 수 있음)
            Object.keys(players).forEach((pKey, idx) => {
                const p = players[pKey];
                let dx = ball.x - p.x; let dy = ball.y - p.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < ball.radius + 110) { 
                    let actionKey = (idx === 0) ? keys['t'] : keys['enter'];

                    if (p.isJumping && actionKey) {
                        if (idx === 0) p1Touches++; else p2Touches++;
                        lastTouchPlayer = pKey; p.spikingVisualTimer = 18;

                        let isBackAttackZone = (idx === 0) ? (p.x < 460) : (p.x > 1240);

                        if (isBackAttackZone) {
                            let speed = 26; let angleRad = 85 * Math.PI / 180;
                            ball.vx = (idx === 0) ? speed * Math.cos(angleRad * 0.12) : -speed * Math.cos(angleRad * 0.12);
                            ball.vy = speed * Math.sin(angleRad * 0.05); 
                            triggerHit("🔥 METEOR BACK ATTACK!!");
                        } else {
                            let speed = 25; let angleRad = 65 * Math.PI / 180;
                            ball.vx = (idx === 0) ? speed * Math.cos(angleRad * 0.5) : -speed * Math.cos(angleRad * 0.5);
                            ball.vy = speed * Math.sin(angleRad * 0.9); 
                            triggerHit("💥 SMASH SPIKE");
                        }
                    } 
                    else if (lastTouchPlayer !== pKey) {
                        ball.vy = -16; ball.vx = (idx === 0) ? 4.5 : -4.5;
                        if (idx === 0) p1Touches = 1; else p2Touches = 1;
                        lastTouchPlayer = pKey;
                        triggerHit("🛡️ SAFE RECEIVE");
                    }
                }
            });

            if (ball.x - ball.radius < 0 || ball.x + ball.radius > canvas.width) ball.vx *= -1;
            const netX = canvas.width/2 - NET_W/2;
            if (ball.x + ball.radius > netX && ball.x - ball.radius < netX + NET_W && ball.y > FLOOR_Y - NET_H) {
                ball.vx *= -0.7; ball.x = ball.x < canvas.width/2 ? netX - ball.radius : netX + NET_W + ball.radius;
            }

            if (ball.y + ball.radius >= FLOOR_Y) {
                if (ball.x < canvas.width / 2) triggerScore('p2'); else triggerScore('p1');
            }
            if (msgTimer > 0) msgTimer--;
        }

        function draw() {
            ctx.save();
            if (shakeFrames > 0) { ctx.translate((Math.random() - 0.5) * 12, (Math.random() - 0.5) * 12); shakeFrames--; }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 실내 스포츠 스타디움 고품격 월 스페이스
            let wallGrad = ctx.createLinearGradient(0, 0, 0, FLOOR_Y);
            wallGrad.addColorStop(0, "#0f121a"); wallGrad.addColorStop(0.7, "#181e29"); wallGrad.addColorStop(1, "#222a3a");
            ctx.fillStyle = wallGrad; ctx.fillRect(0, 0, canvas.width, FLOOR_Y);

            // 관중석 조명 스크린 그래픽 무드 연출
            ctx.fillStyle = "rgba(255, 255, 255, 0.025)";
            for(let cx = 150; cx < canvas.width; cx += 400) {
                ctx.fillRect(cx, 60, 220, 170);
            }

            // 상단 경기 스코어 플래카드 디자인
            ctx.fillStyle = "#161a24"; ctx.fillRect(canvas.width/2 - 250, 45, 500, 55);
            ctx.strokeStyle = "#ff9100"; ctx.lineWidth = 2; ctx.strokeRect(canvas.width/2 - 250, 45, 500, 55);
            ctx.fillStyle = "#fff"; ctx.font = "bold 1.5rem sans-serif"; ctx.textAlign = "center";
            ctx.fillText("THE SPIKE: COURT CHAMPIONSHIP", canvas.width/2, 81);

            // 🪵 스크린샷풍 나무 결 마룻바닥 설계
            ctx.fillStyle = "#222834"; ctx.fillRect(0, FLOOR_Y, canvas.width, 100); 
            let courtGrad = ctx.createLinearGradient(460, FLOOR_Y, 1240, FLOOR_Y);
            courtGrad.addColorStop(0, "#c66e18"); courtGrad.addColorStop(0.5, "#e59747"); courtGrad.addColorStop(1, "#c66e18");
            ctx.fillStyle = courtGrad; ctx.fillRect(460, FLOOR_Y, 780, 100);

            // 세밀한 파켓 텍스처 가로라인 마킹
            ctx.strokeStyle = "rgba(0, 0, 0, 0.15)"; ctx.lineWidth = 2;
            for(let i = FLOOR_Y; i < canvas.height; i += 16) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // 올바른 코트 하이라이트 경계선 레이아웃
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(SERVE_LINE_1P - 4, FLOOR_Y, 8, 100); 
            ctx.fillRect(SERVE_LINE_2P - 4, FLOOR_Y, 8, 100); 
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            ctx.fillRect(460, FLOOR_Y, 6, 100);  
            ctx.fillRect(1234, FLOOR_Y, 6, 100);  
            ctx.fillRect(canvas.width/2 - 3, FLOOR_Y, 6, 100); 
            ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.fillRect(0, FLOOR_Y, canvas.width, 5);

            // 서브 드라이빙 바운더리 가이드 인디케이터 존
            if (isServingPhase) {
                ctx.fillStyle = "rgba(255, 109, 0, 0.15)"; ctx.fillRect(0, FLOOR_Y, SERVE_LINE_1P, 100);
                ctx.fillStyle = "rgba(0, 229, 255, 0.15)"; ctx.fillRect(SERVE_LINE_2P, FLOOR_Y, canvas.width - SERVE_LINE_2P, 100);
            }

            // 고선명 와이어 프로 네트
            ctx.fillStyle = "#4a5766"; ctx.fillRect(canvas.width/2 - NET_W/2, FLOOR_Y - NET_H, NET_W, NET_H);
            ctx.fillStyle = "#ffffff"; ctx.fillRect(canvas.width/2 - NET_W/2, FLOOR_Y - NET_H, NET_W, 24); 
            ctx.strokeStyle = "rgba(255, 255, 255, 0.65)"; ctx.lineWidth = 1.5;
            for(let ny = FLOOR_Y - NET_H + 24; ny < FLOOR_Y; ny += 18) {
                ctx.beginPath(); ctx.moveTo(canvas.width/2 - NET_W/2, ny); ctx.lineTo(canvas.width/2 + NET_W/2, ny); ctx.stroke();
            }

            // 리얼 애니메 레이어 캐릭터들 완벽 렌더링
            setters.forEach(s => drawRealisticAnimePlayer(ctx, s.x, s.y, s.isJumping, s.vy, s.color, s.side, s.spikingVisualTimer));
            players.p1.draw(); players.p2.draw();

            // 유저 타점 영역 보정 서클 가이드 인디케이터
            Object.keys(players).forEach(pKey => {
                let p = players[pKey];
                ctx.beginPath(); ctx.arc(p.x, p.y - 10, p.radius + 110, 0, Math.PI*2);
                ctx.strokeStyle = pKey === 'p1' ? "rgba(255, 109, 0, 0.14)" : "rgba(0, 229, 255, 0.14)";
                ctx.lineWidth = 2.5; ctx.stroke();
            });

            // 삼색 프로 비치 발리볼 패턴 매핑
            ctx.save(); ctx.translate(ball.x, ball.y); ctx.rotate(ball.rotation);
            ctx.beginPath(); ctx.arc(0, 0, ball.radius, 0, Math.PI*2);
            if (ball.isSmashed) {
                ctx.shadowBlur = 40; ctx.shadowColor = "#ff3d00"; ctx.fillStyle = "#ffd600"; ctx.fill();
            } else {
                ctx.shadowBlur = 12; ctx.shadowColor = "rgba(0,0,0,0.4)"; ctx.fillStyle = "#ffffff"; ctx.fill();
            }
            ctx.strokeStyle = "#2979ff"; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(-5, -5, ball.radius * 0.75, 0, Math.PI * 0.8); ctx.stroke();
            ctx.strokeStyle = "#ffd600"; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(5, 5, ball.radius * 0.75, Math.PI, Math.PI * 1.8); ctx.stroke();
            ctx.restore();

            if (msgTimer > 0 || isGameOver) {
                ctx.font = "italic bold 3.0rem sans-serif"; ctx.textAlign = "center";
                ctx.fillStyle = "#ffffff";
                ctx.shadowBlur = 10; ctx.shadowColor = "rgba(0,0,0,0.5)";
                ctx.fillText(gameMsg, canvas.width / 2, 170);
            }
            ctx.restore();
        }

        initServe();
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
